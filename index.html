<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>十八中学联盟校 · 英语学科月口语作文大赛</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Poppins', 'Comic Sans MS', 'Chalkboard SE', cursive, sans-serif;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(145deg, #b8e1fc 0%, #d9e4f5 70%, #f2d9e6 100%);
            padding: 2vh 2vw;
            position: relative;
            overflow-x: hidden;
        }

        body::before {
            content: "";
            position: absolute;
            width: 100%;
            height: 100%;
            background-image: radial-gradient(circle at 20% 30%, rgba(255, 255, 200, 0.3) 8px, transparent 8px),
                              radial-gradient(circle at 90% 70%, rgba(200, 230, 255, 0.5) 12px, transparent 12px),
                              radial-gradient(circle at 40% 80%, #ffe0b570 6px, transparent 6px),
                              radial-gradient(circle at 70% 15%, #ffffff70 10px, transparent 10px);
            background-size: 200px 200px;
            pointer-events: none;
        }

        /* 16:9 主面板 */
        .main-panel {
            max-width: 1280px;
            width: 100%;
            aspect-ratio: 16 / 9;
            background: rgba(255, 255, 255, 0.65);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 70px;
            box-shadow: 0 30px 50px -15px rgba(0, 30, 50, 0.4), inset 0 0 0 2px rgba(255, 255, 255, 0.8);
            padding: 2% 2.5% 2% 2.5%;
            border: 2px solid #ffffffcc;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            position: relative;
        }

        .title-section {
            text-align: center;
            margin-bottom: 0.5%;
        }

        /* 中文标题 - 十八中学联盟校英语学科月口语作文大赛 */
        .chinese-title-banner {
            background: #FFB347;
            color: #1f3162;
            display: inline-block;
            padding: 0.8% 4% 0.8% 4%;
            border-radius: 60px;
            font-size: clamp(1.5rem, 3.5vw, 2.8rem);
            font-weight: 800;
            letter-spacing: 2px;
            word-break: keep-all;
            box-shadow: 0 8px 0 #c06d0b, 0 15px 25px -8px #1a2f4e;
            border: 3px solid #ffefb0;
            text-shadow: 2px 2px 0 #ffdb7e;
            transform: rotate(-0.5deg);
            line-height: 1.3;
            margin-bottom: 0.5%;
            font-family: 'Poppins', 'Segoe UI', 'Microsoft YaHei', sans-serif;
            white-space: nowrap;
            max-width: 95%;
        }

        /* 上一个人抽中的题目 - 大号显示，无标签 */
        .previous-topic-area {
            background: #f5f1e7e5;
            border-radius: 50px;
            padding: 1% 4%;
            margin: 0.3% auto 0.8% auto;
            width: fit-content;
            max-width: 75%;
            text-align: center;
            border: 4px solid #FFB347;
            box-shadow: 0 0 0 4px #ffffff, 0 8px 15px rgba(0,0,0,0.15);
            backdrop-filter: blur(4px);
        }

        .previous-topic {
            font-size: clamp(2rem, 4.5vw, 3.2rem);
            font-weight: 900;
            color: #1a3c57;
            background: #fffcd9;
            padding: 0.8% 8%;
            border-radius: 50px;
            display: inline-block;
            border: 3px dashed #5f9ea0;
            line-height: 1.3;
            box-shadow: inset 0 2px 8px rgba(0,0,0,0.05);
        }

        /* 当前抽题区域 - 小号显示，无标签，与按钮同行 */
        .current-row {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            margin: 0.3% auto 1% auto;
            width: fit-content;
            max-width: 90%;
            flex-wrap: wrap;
        }

        .current-topic-box {
            background: #f5f1e7e5;
            border-radius: 40px;
            padding: 0.5% 2.5%;
            text-align: center;
            border: 2px solid white;
            box-shadow: 0 0 0 2px #aac7e0;
            backdrop-filter: blur(4px);
            flex: 0 1 auto;
        }

        .current-topic {
            font-size: clamp(1.1rem, 2.2vw, 1.6rem);
            font-weight: 700;
            color: #1a3c57;
            background: #fffcd9;
            padding: 0.2% 5%;
            border-radius: 30px;
            display: inline-block;
            border: 2px dashed #5f9ea0;
            line-height: 1.4;
        }

        /* 小圆按钮 - 稍微调小一点 */
        .round-pick-btn {
            background: #ff7300;
            background: linear-gradient(145deg, #ffa040, #ff6600);
            border: none;
            border-radius: 50%;
            width: 60px;
            height: 60px;
            font-size: 1.6rem;
            font-weight: 900;
            color: #1a1f2e;
            box-shadow: 0 6px 0 #9e3d0e, 0 8px 15px -5px #1f1f1f, 0 0 0 3px #fffbc2;
            cursor: pointer;
            transition: 0.08s linear;
            border: 3px solid #fffbc2;
            text-transform: uppercase;
            text-shadow: 1px 1px 0 #ffbe7a;
            display: flex;
            align-items: center;
            justify-content: center;
            line-height: 1;
            padding: 0;
            flex-shrink: 0;
        }

        .round-pick-btn:hover {
            background: linear-gradient(145deg, #ffb054, #ff7710);
            transform: scale(1.1) translateY(-3px);
            box-shadow: 0 8px 0 #9e3d0e, 0 12px 20px -5px #1f1f1f, 0 0 0 4px #ffffb0;
        }

        .round-pick-btn:active {
            transform: translateY(4px) scale(1.05);
            box-shadow: 0 3px 0 #9e3d0e, 0 6px 12px -5px #2b2b2b, 0 0 0 3px #ffffb0;
        }

        /* 五个卡片 - 左右分布 (flex-direction: row) */
        .topics-grid {
            display: flex;
            flex-direction: row;
            justify-content: center;
            align-items: center;
            gap: 1.2%;
            margin: 0.5% 0 0.2% 0;
            flex: 1;
            min-height: 0;
            width: 100%;
        }

        .topic-card {
            flex: 0 1 150px;  /* 固定基础宽度，不伸缩 */
            width: 150px;
            max-width: 160px;
            height: auto;
            aspect-ratio: 3 / 4;
            background: #fefefeec;
            border-radius: 35px 35px 25px 25px;
            padding: 3% 0.5% 2% 0.5%;
            text-align: center;
            cursor: pointer;
            transition: transform 0.15s, box-shadow 0.2s;
            box-shadow: 0 12px 15px -8px rgba(0, 30, 40, 0.2), 0 0 0 2px #fcfcfc inset, 0 0 0 3px #ffffff80 inset;
            border: 2px solid rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(2px);
            display: flex;
            flex-direction: column;
            justify-content: space-evenly;
        }

        .topic-card:nth-child(1) { background: linear-gradient(145deg, #ffdba5, #ffeac5); border-bottom: 6px solid #f9a26c; }
        .topic-card:nth-child(2) { background: linear-gradient(145deg, #bde0fe, #d2e9ff); border-bottom: 6px solid #5fa7e7; }
        .topic-card:nth-child(3) { background: linear-gradient(145deg, #ffb3c6, #ffd9e2); border-bottom: 6px solid #e35f7b; }
        .topic-card:nth-child(4) { background: linear-gradient(145deg, #c4e6c3, #dcf5dc); border-bottom: 6px solid #519b7c; }
        .topic-card:nth-child(5) { background: linear-gradient(145deg, #f9d8cf, #ffe6df); border-bottom: 6px solid #c0816e; }

        .topic-card:hover {
            transform: translateY(-6px) scale(1.02);
            box-shadow: 0 22px 22px -10px #1d35578f, 0 0 0 3px #ffffff, 0 0 0 5px #a4c3e8;
        }

        .topic-card.selected {
            transform: scale(1.02) translateY(-5px);
            box-shadow: 0 0 0 4px #f9dbb0, 0 20px 20px -10px #023047, 0 0 0 7px #ffffffb3;
            border-bottom: 6px solid #f9dbb0;
        }

        /* 五个卡片上的图片大小完全一致 - 确保完全进入框内 */
        .topic-icon {
            font-size: 2.5rem;  /* 固定大小，确保在框内 */
            line-height: 1;
            filter: drop-shadow(2px 4px 3px rgba(0,0,0,0.1));
            margin-bottom: 1%;
        }

        .topic-title {
            font-size: 0.9rem;  /* 固定稍小文字 */
            font-weight: 700;
            color: #1f3f5c;
            word-break: break-word;
            background: rgba(255, 255, 255, 0.5);
            border-radius: 30px;
            width: fit-content;
            margin: 0 auto;
            line-height: 1.2;
            padding: 0 6px;
            max-width: 95%;
        }

        .topic-emoji-hint {
            font-size: 1.1rem;  /* 固定大小 */
            opacity: 0.8;
            margin-top: 1%;
            letter-spacing: 2px;
        }

        /* 手机和平板适配 */
        @media (max-width: 900px) {
            .main-panel {
                aspect-ratio: auto;
                min-height: auto;
                padding: 15px;
            }
            .topics-grid {
                flex-wrap: wrap;  /* 手机允许换行 */
                gap: 8px;
                margin: 10px 0;
            }
            .topic-card {
                flex: 0 1 130px;
                width: 130px;
            }
            .current-row {
                flex-direction: column;
                gap: 12px;
            }
            .round-pick-btn {
                width: 55px;
                height: 55px;
                font-size: 1.4rem;
            }
            .topic-icon {
                font-size: 2.2rem;
            }
            .chinese-title-banner {
                white-space: normal;  /* 手机允许换行 */
                font-size: 1.3rem;
                padding: 1% 3%;
            }
        }

        /* 大屏微调 */
        @media (min-width: 1280px) {
            .topic-card {
                flex: 0 1 160px;
                width: 160px;
            }
            .topic-icon {
                font-size: 2.8rem;
            }
            .topic-title {
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>
    <div class="main-panel">
        <div class="title-section">
            <!-- 十八中学联盟校英语学科月口语作文大赛 -->
            <div class="chinese-title-banner">
                🗣️ 十八中学联盟校英语学科月口语作文大赛 🗣️
            </div>
        </div>

        <!-- 上一个人抽中的题目 - 大号显示，无标签 -->
        <div class="previous-topic-area" id="previousTopicArea">
            <div class="previous-topic" id="previousTopicDisplay">——</div>
        </div>

        <!-- 当前抽题区域（小号，无标签）+ 按钮 -->
        <div class="current-row">
            <div class="current-topic-box" id="currentTopicBox">
                <div class="current-topic" id="currentTopicDisplay">——</div>
            </div>
            
            <!-- 小圆按钮 -->
            <button class="round-pick-btn" id="randomPickBtn">⚡</button>
        </div>

        <!-- 五个纯英文卡片 - 左右分布，图片完全进入框内 -->
        <div class="topics-grid" id="topicGrid">
            <div class="topic-card" data-topic="My Friend" data-index="0">
                <div class="topic-icon">👫</div>
                <div class="topic-title">My Friend</div>
                <div class="topic-emoji-hint">🤝🧑‍🤝‍🧑</div>
            </div>
            <div class="topic-card" data-topic="My Favorite Animal" data-index="1">
                <div class="topic-icon">🐼🐶</div>
                <div class="topic-title">My Favorite Animal</div>
                <div class="topic-emoji-hint">🐱🐨🦊</div>
            </div>
            <div class="topic-card" data-topic="My Family" data-index="2">
                <div class="topic-icon">🏡👨‍👩‍👧</div>
                <div class="topic-title">My Family</div>
                <div class="topic-emoji-hint">👪❤️</div>
            </div>
            <div class="topic-card" data-topic="My Favorite Subject" data-index="3">
                <div class="topic-icon">📚🧮</div>
                <div class="topic-title">My Favorite Subject</div>
                <div class="topic-emoji-hint">🔬🎨📐</div>
            </div>
            <div class="topic-card" data-topic="My Hobby" data-index="4">
                <div class="topic-icon">⚽🎨</div>
                <div class="topic-title">My Hobby</div>
                <div class="topic-emoji-hint">🎸♟️📷</div>
            </div>
        </div>
    </div>

    <script>
        (function() {
            const cards = document.querySelectorAll('.topic-card');
            const randomBtn = document.getElementById('randomPickBtn');
            const previousTopicDisplay = document.getElementById('previousTopicDisplay');
            const currentTopicDisplay = document.getElementById('currentTopicDisplay');

            const topics = [
                'My Friend',
                'My Favorite Animal',
                'My Family',
                'My Favorite Subject',
                'My Hobby'
            ];

            function removeAllSelected() {
                cards.forEach(card => card.classList.remove('selected'));
            }

            function selectTopicByIndex(index) {
                removeAllSelected();
                if (index >= 0 && index < cards.length) {
                    cards[index].classList.add('selected');
                    
                    const newTopic = topics[index];
                    
                    if (currentTopicDisplay.textContent !== '——') {
                        previousTopicDisplay.textContent = currentTopicDisplay.textContent;
                    } else {
                        previousTopicDisplay.textContent = newTopic;
                    }
                    
                    currentTopicDisplay.textContent = newTopic;
                }
            }

            function pickRandomTopic() {
                const randomIndex = Math.floor(Math.random() * 5);
                selectTopicByIndex(randomIndex);
            }

            cards.forEach((card, idx) => {
                card.addEventListener('click', () => selectTopicByIndex(idx));
            });

            randomBtn.addEventListener('click', pickRandomTopic);

            window.addEventListener('load', () => {
                setTimeout(pickRandomTopic, 80);
            });
        })();
    </script>
</body>
</html>
